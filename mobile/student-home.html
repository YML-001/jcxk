<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的成长档案</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'OPPOSans',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#F5F7FA;color:#3C444F;min-height:100vh;max-width:428px;margin:0 auto;font-size:14px;position:relative;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

.top-bar{position:sticky;top:0;z-index:100;background:#fff;height:44px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #ECEFF4;font-size:16px;font-weight:600}

.page-body{padding:16px 16px 80px}

.profile-card{background:#fff;border-radius:16px;overflow:hidden;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.04)}
.profile-header{background:linear-gradient(135deg,#1BB975 0%,#0fae66 50%,#0d8d56 100%);padding:24px 20px 20px;display:flex;gap:14px;align-items:center;position:relative;overflow:hidden}
.profile-header::before{content:'';position:absolute;top:-60px;right:-30px;width:180px;height:180px;background:rgba(255,255,255,0.08);border-radius:50%}
.profile-header::after{content:'';position:absolute;bottom:-80px;right:80px;width:140px;height:140px;background:rgba(255,255,255,0.05);border-radius:50%}
.avatar{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:700;flex-shrink:0;border:2px solid rgba(255,255,255,0.4);position:relative;z-index:1}
.profile-info{position:relative;z-index:1;color:#fff}
.profile-name{font-size:18px;font-weight:700;margin-bottom:2px}
.profile-name span{font-size:12px;font-weight:400;opacity:0.85;margin-left:6px}
.profile-dept{font-size:12px;opacity:0.9;line-height:1.6}
.profile-body{padding:14px 20px}
.profile-tags{display:flex;flex-wrap:wrap;gap:8px}
.p-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#E8FCF4;border-radius:6px;font-size:12px;color:#1BB975;font-weight:500}
.p-tag i{font-size:11px}

.section-title{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,0.03);cursor:pointer;transition:transform .15s,box-shadow .15s}
.stat-card:active{transform:scale(0.97)}
.stat-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.stat-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.stat-icon.blue{background:#E3F1F9;color:#3087CC}
.stat-icon.green{background:#E8FCF4;color:#1BB975}
.stat-icon.orange{background:#FFF5E5;color:#F29100}
.stat-icon.purple{background:#F0E5FF;color:#8A4FE0}
.stat-num{font-size:24px;font-weight:700;color:#3C444F;line-height:1}
.stat-label{font-size:12px;color:#9096A2;margin-top:2px}

.todo-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.03)}
.todo-item{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid #F2F3F5;align-items:flex-start;cursor:pointer;transition:background .15s;border-radius:8px}
.todo-item:active{background:#F5F7FA}
.todo-item:last-child{border-bottom:none;padding-bottom:0}
.todo-item:first-child{padding-top:0}
.todo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.todo-dot.orange{background:#F29100}
.todo-dot.green{background:#1BB975}
.todo-dot.red{background:#DF2027}
.todo-content{flex:1;min-width:0}
.todo-text{font-size:13px;color:#3C444F;line-height:1.5}
.todo-tag{display:inline-block;font-size:11px;padding:2px 6px;border-radius:4px;margin-top:4px;font-weight:500}
.todo-tag.orange{background:#FFF5E5;color:#F29100}
.todo-tag.green{background:#E8FCF4;color:#1BB975}
.todo-tag.red{background:#FCE8EA;color:#DF2027}

.shortcuts{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.shortcut-item{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 4px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.03);cursor:pointer;transition:transform .15s}
.shortcut-item:active{transform:scale(0.95)}
.shortcut-icon{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1BB975,#0fae66);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.shortcut-label{font-size:12px;color:#696F7D;font-weight:500}

.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:428px;height:56px;background:#fff;border-top:1px solid #ECEFF4;display:flex;align-items:center;z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:#9096A2;cursor:pointer;padding:6px 0;transition:color .15s;text-decoration:none}
.tab-item i{font-size:20px}
.tab-item.active{color:#1BB975}
.tab-item:active{opacity:0.7}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);background:rgba(0,0,0,0.75);color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;z-index:999;opacity:0;transition:all .3s;pointer-events:none;max-width:300px;text-align:center}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

.drawer-mask{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.drawer-mask.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:428px;background:#fff;border-radius:20px 20px 0 0;z-index:201;transition:transform .35s cubic-bezier(0.32,0.72,0,1);overflow-y:auto;-webkit-overflow-scrolling:touch}
.drawer.show{transform:translateX(-50%) translateY(0)}
.drawer-handle{width:36px;height:4px;background:#E0E0E0;border-radius:2px;margin:10px auto 0;cursor:pointer}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
.drawer-title{font-size:16px;font-weight:700}
.drawer-close{width:28px;height:28px;border-radius:50%;background:#F5F7FA;display:flex;align-items:center;justify-content:center;font-size:14px;color:#9096A2;cursor:pointer;border:none}
.drawer-body{padding:0 20px 24px}

.review-item{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid #F2F3F5}
.review-item:last-child{border-bottom:none}
.review-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.review-icon.done{background:#E8FCF4;color:#1BB975}
.review-icon.pending{background:#FFF5E5;color:#F29100}
.review-icon.wait{background:#F2F3F5;color:#C8CAD1}
.review-info{flex:1;min-width:0}
.review-label{font-size:14px;font-weight:600;margin-bottom:2px}
.review-sub{font-size:12px;color:#9096A2}
.review-arrow{color:#C8CAD1;font-size:12px}
.review-progress{width:100%;height:6px;background:#F2F3F5;border-radius:3px;margin-top:4px;overflow:hidden}
.review-progress-fill{height:100%;background:#1BB975;border-radius:3px;transition:width .3s}

.profile-menu-item{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid #F2F3F5;cursor:pointer;transition:background .15s}
.profile-menu-item:active{background:#F5F7FA}
.profile-menu-item:last-child{border-bottom:none}
.profile-menu-icon{width:36px;height:36px;border-radius:10px;background:#F0FBF6;color:#1BB975;display:flex;align-items:center;justify-content:center;font-size:15px}
.profile-menu-icon.red{background:#FCE8EA;color:#DF2027}
.profile-menu-label{flex:1;font-size:14px;font-weight:500}
.profile-menu-badge{width:8px;height:8px;border-radius:50%;background:#DF2027;margin-right:4px}
.profile-menu-arrow{color:#C8CAD1;font-size:12px}
.profile-top{display:flex;align-items:center;gap:14px;padding-bottom:20px;border-bottom:1px solid #F2F3F5;margin-bottom:4px}
.profile-top-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1BB975,#0fae66);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;flex-shrink:0}
.profile-top-info .name{font-size:17px;font-weight:700;margin-bottom:2px}
.profile-top-info .sid{font-size:12px;color:#9096A2}
</style>
</head>
<body>
<div class="top-bar">我的成长档案</div>

<div class="page-body">
  <div class="profile-card">
    <div class="profile-header">
      <div class="avatar">王</div>
      <div class="profile-info">
        <div class="profile-name">王明 <span>2022010101</span></div>
        <div class="profile-dept">计算机科学与技术 · 计算机学院</div>
      </div>
    </div>
    <div class="profile-body">
      <div class="profile-tags">
        <div class="p-tag"><i class="fas fa-star"></i> 特色培养项目：国家级基础学科拔尖基地</div>
        <div class="p-tag"><i class="fas fa-user-tie"></i> 导师：李教授</div>
      </div>
    </div>
  </div>

  <div class="section-title"><i class="fas fa-chart-bar" style="color:#1BB975"></i> 成果统计</div>
  <div class="stats-grid">
    <div class="stat-card" onclick="location.href='student-archive.html#awards'">
      <div class="stat-icon blue"><i class="fas fa-trophy"></i></div>
      <div><div class="stat-num">3</div><div class="stat-label">竞赛获奖</div></div>
    </div>
    <div class="stat-card" onclick="location.href='student-archive.html#papers'">
      <div class="stat-icon green"><i class="fas fa-file-lines"></i></div>
      <div><div class="stat-num">1</div><div class="stat-label">发表论文</div></div>
    </div>
    <div class="stat-card" onclick="location.href='student-archive.html#patents'">
      <div class="stat-icon orange"><i class="fas fa-lightbulb"></i></div>
      <div><div class="stat-num">0</div><div class="stat-label">专利软著</div></div>
    </div>
    <div class="stat-card" onclick="location.href='student-archive.html#innovation'">
      <div class="stat-icon purple"><i class="fas fa-rocket"></i></div>
      <div><div class="stat-num">2</div><div class="stat-label">创新创业</div></div>
    </div>
  </div>

  <div class="todo-card">
    <div class="section-title" style="margin-bottom:8px"><i class="fas fa-bell" style="color:#F29100"></i> 待办事项</div>
    <div class="todo-item" onclick="location.href='student-confirm.html'">
      <div class="todo-dot orange"></div>
      <div class="todo-content">
        <div class="todo-text">请确认 2025-2026 学年数据</div>
        <div class="todo-tag orange">数据确认</div>
      </div>
    </div>
    <div class="todo-item" onclick="location.href='student-requests.html'">
      <div class="todo-dot green"></div>
      <div class="todo-content">
        <div class="todo-text">竞赛获奖补充申请已通过</div>
        <div class="todo-tag green">已通过</div>
      </div>
    </div>
    <div class="todo-item" onclick="location.href='student-requests.html'">
      <div class="todo-dot red"></div>
      <div class="todo-content">
        <div class="todo-text">论文勘误申请被退回，请修改后重提</div>
        <div class="todo-tag red">已退回</div>
      </div>
    </div>
  </div>

  <div class="section-title"><i class="fas fa-grip" style="color:#1BB975"></i> 快捷入口</div>
  <div class="shortcuts">
    <a href="student-archive.html" class="shortcut-item">
      <div class="shortcut-icon"><i class="fas fa-folder-open"></i></div>
      <div class="shortcut-label">查看档案</div>
    </a>
    <a href="student-supplement.html" class="shortcut-item">
      <div class="shortcut-icon"><i class="fas fa-plus-circle"></i></div>
      <div class="shortcut-label">数据补充</div>
    </a>
    <a href="student-correction.html" class="shortcut-item">
      <div class="shortcut-icon" style="background:linear-gradient(135deg,#F29100,#e08000)"><i class="fas fa-pen-to-square"></i></div>
      <div class="shortcut-label">数据勘误</div>
    </a>
    <a href="student-requests.html" class="shortcut-item">
      <div class="shortcut-icon"><i class="fas fa-list-check"></i></div>
      <div class="shortcut-label">我的申请</div>
    </a>
  </div>
</div>

<div class="tab-bar">
  <a class="tab-item active" href="student-home.html"><i class="fas fa-home"></i><span>首页</span></a>
  <a class="tab-item" href="student-archive.html"><i class="fas fa-archive"></i><span>档案</span></a>
  <a class="tab-item" href="student-requests.html"><i class="fas fa-paper-plane"></i><span>申请</span></a>
  <a class="tab-item" href="student-confirm.html"><i class="fas fa-clipboard-check"></i><span>鉴定</span></a>
</div>

<div class="drawer-mask" id="drawerMask" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle" onclick="closeDrawer()"></div>
  <div class="drawer-header">
    <div class="drawer-title" id="drawerTitle"></div>
    <button class="drawer-close" onclick="closeDrawer()"><i class="fas fa-xmark"></i></button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(function(){t.classList.remove('show')},2000)}

function openDrawer(title,html){
  document.getElementById('drawerTitle').textContent=title;
  document.getElementById('drawerBody').innerHTML=html;
  document.getElementById('drawerMask').classList.add('show');
  document.getElementById('drawer').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeDrawer(){
  document.getElementById('drawerMask').classList.remove('show');
  document.getElementById('drawer').classList.remove('show');
  document.body.style.overflow='';
}

</script>
</body>
</html>
