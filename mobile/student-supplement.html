<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数据补充 · 学生端</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'OPPOSans',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#F5F7FA;color:#1E2532;max-width:428px;margin:0 auto;min-height:100vh;font-size:14px;padding-bottom:80px;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:14px}

.navbar{position:sticky;top:0;z-index:100;height:44px;background:#fff;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #ECEFF4}
.navbar .back{font-size:18px;color:#3C444F;padding:8px 8px 8px 0}
.navbar .title{flex:1;text-align:center;font-size:16px;font-weight:600;color:#1E2532;margin-right:26px}

.section{padding:16px}
.section-title{font-size:15px;font-weight:600;color:#1E2532;margin-bottom:12px}

.category-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 4px;background:#fff;border-radius:12px;border:2px solid transparent;transition:all .2s;cursor:pointer}
.cat-btn i{font-size:22px;color:#9096A2;transition:color .2s}
.cat-btn span{font-size:12px;color:#696F7D;transition:color .2s;text-align:center;line-height:1.3}
.cat-btn.active{border-color:#1BB975;background:#F0FBF6}
.cat-btn.active i{color:#1BB975}
.cat-btn.active span{color:#1BB975;font-weight:600}

.form-card{background:#fff;border-radius:14px;padding:20px 16px;margin:0 16px 16px}
.form-group{margin-bottom:18px}
.form-group:last-child{margin-bottom:0}
.form-label{display:block;font-size:13px;color:#696F7D;margin-bottom:6px;font-weight:500}
.form-input{width:100%;height:44px;padding:0 14px;border:1px solid #E0E3E8;border-radius:10px;background:#FAFBFC;outline:none;font-size:14px;color:#1E2532;transition:border-color .2s}
.form-input:focus{border-color:#1BB975;background:#fff}
.form-select{width:100%;height:44px;padding:0 14px;border:1px solid #E0E3E8;border-radius:10px;background:#FAFBFC;outline:none;font-size:14px;color:#1E2532;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .2s;-webkit-user-select:none;user-select:none}
.form-select .placeholder{color:#B0B5BF}
.form-select i{color:#B0B5BF;font-size:12px}
.form-textarea{width:100%;min-height:88px;padding:12px 14px;border:1px solid #E0E3E8;border-radius:10px;background:#FAFBFC;outline:none;font-size:14px;color:#1E2532;resize:vertical;transition:border-color .2s;line-height:1.6}
.form-textarea:focus{border-color:#1BB975;background:#fff}
.form-switch{position:relative;width:48px;height:28px;background:#E0E3E8;border-radius:14px;cursor:pointer;transition:background .2s;flex-shrink:0}
.form-switch.on{background:#1BB975}
.form-switch::after{content:'';position:absolute;top:2px;left:2px;width:24px;height:24px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
.form-switch.on::after{left:22px}
.form-row{display:flex;align-items:center;justify-content:space-between;height:44px}

.upload-card{background:#fff;border-radius:14px;padding:20px 16px;margin:0 16px 16px}
.upload-title{font-size:15px;font-weight:600;color:#1E2532;margin-bottom:4px}
.upload-title .required{color:#E8443A;font-size:13px}
.upload-area{border:2px dashed #D4D8DF;border-radius:12px;padding:28px 16px;text-align:center;margin:12px 0;cursor:pointer;transition:border-color .2s}
.upload-area:active{border-color:#1BB975}
.upload-area i{font-size:32px;color:#B0B5BF;margin-bottom:8px}
.upload-area .upload-actions{display:flex;justify-content:center;gap:24px;margin-top:10px}
.upload-area .upload-actions span{font-size:13px;color:#1BB975;font-weight:500}
.upload-area .upload-actions span i{font-size:14px;margin-right:4px;color:#1BB975}
.upload-preview{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.upload-thumb{width:72px;height:72px;border-radius:10px;background:#F0F2F5;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.upload-thumb img{width:100%;height:100%;object-fit:cover}
.upload-thumb .thumb-placeholder{background:linear-gradient(135deg,#1BB975,#15a366);width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;flex-direction:column;gap:2px}
.upload-thumb .thumb-placeholder i{font-size:18px}
.upload-thumb .remove{position:absolute;top:-4px;right:-4px;width:20px;height:20px;background:#E8443A;color:#fff;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.upload-hint{font-size:12px;color:#9096A2;margin-top:8px}

.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:428px;background:#fff;border-top:1px solid #ECEFF4;padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));display:flex;gap:12px;z-index:100}
.btn{flex:1;height:46px;border-radius:12px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer}
.btn-gray{background:#F0F2F5;color:#696F7D}
.btn-gray:active{background:#E0E3E8}
.btn-green{background:#1BB975;color:#fff}
.btn-green:active{background:#15a366}

.picker-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.picker-mask.show{opacity:1;pointer-events:auto}
.picker-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:428px;background:#fff;border-radius:16px 16px 0 0;padding-bottom:env(safe-area-inset-bottom,0px);z-index:201;transition:transform .3s cubic-bezier(0.32,0.72,0,1)}
.picker-mask.show+.picker-panel,.picker-panel.show{transform:translateX(-50%) translateY(0)}
.picker-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #F0F2F5}
.picker-header .cancel{font-size:14px;color:#9096A2;cursor:pointer}
.picker-header .title{font-size:16px;font-weight:600;color:#1E2532}
.picker-header .confirm{font-size:14px;color:#1BB975;font-weight:600;cursor:pointer}
.picker-options{padding:8px 16px 16px;max-height:50vh;overflow-y:auto}
.picker-option{padding:14px 16px;font-size:15px;color:#3C444F;border-radius:10px;cursor:pointer;transition:background .15s}
.picker-option:active,.picker-option.selected{background:#F0FBF6;color:#1BB975;font-weight:600}

.action-sheet-mask{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
.action-sheet-mask.show{opacity:1;pointer-events:auto}
.action-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:428px;z-index:301;transition:transform .3s cubic-bezier(0.32,0.72,0,1);padding:0 12px 12px}
.action-sheet.show{transform:translateX(-50%) translateY(0)}
.action-sheet-group{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:8px}
.action-sheet-item{padding:16px;text-align:center;font-size:16px;color:#3C444F;cursor:pointer;border-bottom:1px solid #F2F3F5;transition:background .15s}
.action-sheet-item:last-child{border-bottom:none}
.action-sheet-item:active{background:#F5F7FA}
.action-sheet-item i{margin-right:8px;color:#1BB975}
.action-sheet-cancel{background:#fff;border-radius:14px;padding:16px;text-align:center;font-size:16px;color:#DF2027;font-weight:600;cursor:pointer}
.action-sheet-cancel:active{background:#F5F7FA}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);background:rgba(30,37,50,0.88);color:#fff;padding:14px 28px;border-radius:12px;font-size:14px;z-index:999;opacity:0;transition:all .25s;pointer-events:none;text-align:center;max-width:280px}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.toast i{display:block;font-size:28px;margin-bottom:8px}
</style>
</head>
<body>

<div class="navbar">
  <a class="back" href="student-requests.html"><i class="fa-solid fa-chevron-left"></i></a>
  <div class="title">数据补充</div>
</div>

<a href="student-correction.html" style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:#FFF9F0;border-bottom:2px solid #F29100;text-decoration:none;-webkit-tap-highlight-color:transparent">
  <div style="width:34px;height:34px;border-radius:8px;background:#F29100;display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fa-solid fa-pen-to-square" style="color:#fff;font-size:15px"></i></div>
  <div style="flex:1">
    <div style="font-size:13px;font-weight:600;color:#1E2532">勘误现有数据</div>
    <div style="font-size:12px;color:#9096A2;margin-top:1px">发现已有记录有误？点此申请修正</div>
  </div>
  <i class="fa-solid fa-chevron-right" style="color:#F29100;font-size:13px"></i>
</a>

<div class="section">
  <div class="section-title">选择类目</div>
  <div class="category-grid" id="catGrid">
    <div class="cat-btn active" data-cat="competition"><i class="fa-solid fa-trophy"></i><span>竞赛获奖</span></div>
    <div class="cat-btn" data-cat="other-award"><i class="fa-solid fa-award"></i><span>其他获奖</span></div>
    <div class="cat-btn" data-cat="innovation"><i class="fa-solid fa-lightbulb"></i><span>创新创业</span></div>
    <div class="cat-btn" data-cat="paper"><i class="fa-solid fa-file-lines"></i><span>发表论文</span></div>
    <div class="cat-btn" data-cat="patent"><i class="fa-solid fa-certificate"></i><span>专利软著</span></div>
    <div class="cat-btn" data-cat="exchange"><i class="fa-solid fa-plane"></i><span>境内外交流</span></div>
    <div class="cat-btn" data-cat="scholarship"><i class="fa-solid fa-coins"></i><span>奖学金</span></div>
    <div class="cat-btn" data-cat="research"><i class="fa-solid fa-flask"></i><span>科研实践</span></div>
    <div class="cat-btn" data-cat="graduation"><i class="fa-solid fa-route"></i><span>毕业去向</span></div>
  </div>
</div>

<div class="form-card" id="formCard"></div>

<div class="upload-card">
  <div class="upload-title">上传证明材料 <span class="required">（必须）</span></div>
  <div class="upload-area" onclick="openActionSheet()">
    <i class="fa-solid fa-camera"></i>
    <div class="upload-actions">
      <span><i class="fa-solid fa-camera"></i>拍照上传</span>
      <span><i class="fa-solid fa-image"></i>从相册选择</span>
    </div>
  </div>
  <div class="upload-preview">
    <div class="upload-thumb">
      <div class="thumb-placeholder"><i class="fa-solid fa-file-pdf"></i>获奖证书.pdf</div>
      <div class="remove" onclick="event.stopPropagation();showToast('已删除','info')"><i class="fa-solid fa-xmark"></i></div>
    </div>
  </div>
  <div class="upload-hint">支持 jpg/png/pdf，单文件≤20MB</div>
</div>

<div class="bottom-bar">
  <button class="btn btn-gray" onclick="showToast('已保存为草稿','success')">暂存草稿</button>
  <button class="btn btn-green" onclick="submitForm()">提交申请</button>
</div>

<div class="picker-mask" id="pickerMask" onclick="closePicker()"></div>
<div class="picker-panel" id="pickerPanel" onclick="event.stopPropagation()">
  <div class="picker-header">
    <span class="cancel" onclick="closePicker()">取消</span>
    <span class="title" id="pickerTitle"></span>
    <span class="confirm" onclick="confirmPicker()">确认</span>
  </div>
  <div class="picker-options" id="pickerOptions"></div>
</div>

<div class="action-sheet-mask" id="actionSheetMask" onclick="closeActionSheet()"></div>
<div class="action-sheet" id="actionSheet">
  <div class="action-sheet-group">
    <div class="action-sheet-item" onclick="closeActionSheet();showToast('已打开相机','info')"><i class="fa-solid fa-camera"></i>拍照上传</div>
    <div class="action-sheet-item" onclick="closeActionSheet();showToast('已打开相册','info')"><i class="fa-solid fa-image"></i>从相册选择</div>
    <div class="action-sheet-item" onclick="closeActionSheet();showToast('已打开文件管理器','info')"><i class="fa-solid fa-folder-open"></i>选择文件</div>
  </div>
  <div class="action-sheet-cancel" onclick="closeActionSheet()">取消</div>
</div>

<div class="toast" id="toast"></div>

<script>
var formTemplates={
  competition:'<div class="form-group"><label class="form-label">竞赛名称</label><input class="form-input" type="text" placeholder="请输入竞赛全称"></div>'
    +'<div class="form-group"><label class="form-label">竞赛级别</label><div class="form-select" onclick="openPicker(\'level\',\'竞赛级别\',[\'国家级\',\'省级\',\'校级\',\'其他\'],this)"><span class="placeholder">请选择</span><i class="fa-solid fa-chevron-right"></i></div></div>'
    +'<div class="form-group"><label class="form-label">获奖等级</label><div class="form-select" onclick="openPicker(\'prize\',\'获奖等级\',[\'特等奖\',\'一等奖\',\'二等奖\',\'三等奖\',\'金奖\',\'银奖\',\'铜奖\',\'优秀奖\'],this)"><span class="placeholder">请选择</span><i class="fa-solid fa-chevron-right"></i></div></div>'
    +'<div class="form-group"><label class="form-label">获奖时间</label><input class="form-input" type="date" style="color:#B0B5BF" onfocus="this.style.color=\'#1E2532\'"></div>'
    +'<div class="form-group"><label class="form-label">是否学术竞赛</label><div class="form-select" onclick="openPicker(\'acad\',\'是否学术竞赛\',[\'是（学术竞赛）\',\'否（非学术竞赛）\'],this)"><span class="placeholder">请选择</span><i class="fa-solid fa-chevron-right"></i></div></div>'
    +'<div class="form-group"><label class="form-label">备注</label><textarea class="form-textarea" placeholder="补充说明（选填）"></textarea></div>',

  'other-award':'<div class="form-group"><label class="form-label">奖项名称</label><input class="form-input" type="text" placeholder="请输入奖项完整名称"></div>'
    +'<div class="form-group"><label class="form-label">奖项级别</label><div class="form-select" onclick="openPicker(\'oaLv\',\'奖项级别\',[\'国家级\',\'省级\',\'校级\',\'院级\',\'其他\'],this)"><span class="placeholder">请选择</span><i class="fa-solid fa-chevron-right"></i></div></div>'
    +'<div class="form-group"><label class="form-label">奖项等级</label><div class="form-select" onclick="openPicker(\'oaGd\',\'奖项等级\',[\'特等奖\',\'一等奖\',\'二等奖\',\'三等奖\',\'优秀奖\',\'荣誉称号\',\'其他\'],this)"><span class="placeholder">请选择</span><i class="fa-solid fa-chevron-right"></i></div></div>'
    +'<div class="form-group"><label class="form-label">获奖时间</label><input class="form-input" type="date" style="color:#B0B5BF" onfocus="this.style.color=\'#1E2532\'"></div>'
    +'<div class="form-group"><label class="form-label">备注</label><textarea class="form-textarea" placeholder="补充说明（选填）"></textarea></div>',

  innovation:'<div class="form-group"><label class="form-label">项目名称</label><input class="form-input" type="text" placeholder="创新创业项目名称"></div>'
    +'<div class="form-group"><label class="form-label">项目级别</label><div class="form-select" onclick="openPicker(\'innLv\',\'项目级别\',[\'国家级\',\'省级\',\'校级\',\'院级\'],this)"><span class="placeholder">请选择</span><i class="fa-solid fa-chevron-right"></i></div></div>'
    +'<div class="form-group"><label class="form-label">是否主持项目</label><div class="form-select" onclick="openPicker(\'innHost\',\'是否主持\',[\'是（主持人）\',\'否（参与者）\'],this)"><span class="placeholder">请选择</span><i class="fa-solid fa-chevron-right"></i></div></div>'
    +'<div class="form-group"><label class="form-label">项目设立时间</label><input class="form-input" type="date" style="color:#B0B5BF" onfocus="this.style.color=\'#1E2532\'"></div>'
    +'<div class="form-group"><label class="form-label">项目状态</label><div class="form-select" onclick="openPicker(\'innSt\',\'项目状态\',[\'进行中\',\'已结题\',\'已中止\'],this)"><span class="placeholder">请选择</span><i class="fa-solid fa-chevron-right"></i></div></div>'
    +'<div class="form-group"><label class="form-label">项目结题结果</label><div class="form-select" onclick="openPicker(\'innRes\',\'结题结果\',[\'优秀\',\'良好\',\'合格\',\'不合格\',\'未结题\'],this)"><span class="placeholder">请选择</span><i class="fa-solid fa-chevron-right"></i></div></div>'
    +'<div class="form-group"><label class="form-label">备注</label><textarea class="form-textarea" placeholder="补充说明（选填）"></textarea></div>',

  paper:'<div class="form-group"><label class="form-label">论文名称</label><input class="form-input" type="text" placeholder="请输入论文完整标题"></div>'
    +'<div class="form-group"><label class="form-label">论文类型</label><div class="form-select" onclick="openPicker(\'pType\',\'论文类型\',[\'期刊论文\',\'会议论文\',\'学位论文\',\'其他\'],this)"><span class="placeholder">请选择</span><i class="fa-solid fa-chevron-right"></i></div></div>'
    +'<div class="form-group"><label class="form-label">刊物名称</label><input class="form-input" type="text" placeholder="期刊或会议名称"></div>'
    +'<div class="form-group"><label class="form-label">期刊等级</label><div class="form-select" onclick="openPicker(\'jrLv\',\'期刊等级\',[\'SCI一区\',\'SCI二区\',\'SCI三区\',\'SCI四区\',\'EI\',\'CSSCI\',\'核心期刊\',\'普通期刊\',\'会议论文\'],this)"><span class="placeholder">请选择</span><i class="fa-solid fa-chevron-right"></i></div></div>'
    +'<div class="form-group"><label class="form-label">发表时间</label><input class="form-input" type="date" style="color:#B0B5BF" onfocus="this.style.color=\'#1E2532\'"></div>'
    +'<div class="form-group"><label class="form-label">是否一作</label><div class="form-select" onclick="openPicker(\'auth\',\'作者身份\',[\'第一作者\',\'导师一作本人二作\',\'第二作者\',\'第三作者\',\'通讯作者\',\'其他\'],this)"><span class="placeholder">请选择</span><i class="fa-solid fa-chevron-right"></i></div></div>'
    +'<div class="form-group"><label class="form-label">卷数</label><input class="form-input" type="text" placeholder="如 Vol.131"></div>'
    +'<div class="form-group"><label class="form-label">页码</label><input class="form-input" type="text" placeholder="如 p.146801"></div>'
    +'<div class="form-group"><label class="form-label">DOI（选填）</label><input class="form-input" type="text" placeholder="DOI"></div>'
    +'<div class="form-group"><label class="form-label">备注</label><textarea class="form-textarea" placeholder="补充说明（选填）"></textarea></div>',

  patent:'<div class="form-group"><label class="form-label">类型</label><div class="form-select" onclick="openPicker(\'ptT\',\'类型\',[\'专利\',\'软件著作权\'],this)"><span class="placeholder">请选择</span><i class="fa-solid fa-chevron-right"></i></div></div>'
    +'<div class="form-group"><label class="form-label">专利或软件名称</label><input class="form-input" type="text" placeholder="完整名称"></div>'
    +'<div class="form-group"><label class="form-label">专利类别</label><div class="form-select" onclick="openPicker(\'ptC\',\'专利类别\',[\'发明专利\',\'实用新型\',\'外观设计\',\'不适用（软著）\'],this)"><span class="placeholder">请选择</span><i class="fa-solid fa-chevron-right"></i></div></div>'
    +'<div class="form-group"><label class="form-label">状态</label><div class="form-select" onclick="openPicker(\'ptS\',\'状态\',[\'已授权\',\'已受理\',\'审查中\',\'已公开\'],this)"><span class="placeholder">请选择</span><i class="fa-solid fa-chevron-right"></i></div></div>'
    +'<div class="form-group"><label class="form-label">获得时间</label><input class="form-input" type="date" style="color:#B0B5BF" onfocus="this.style.color=\'#1E2532\'"></div>'
    +'<div class="form-group"><label class="form-label">本人排名</label><div class="form-select" onclick="openPicker(\'ptR\',\'本人排名\',[\'第一\',\'第二\',\'第三\',\'其他\'],this)"><span class="placeholder">请选择</span><i class="fa-solid fa-chevron-right"></i></div></div>'

function renderForm(cat){
  var html=formTemplates[cat]||formTemplates._default;
  document.getElementById('formCard').innerHTML=html;
}

var catBtns=document.querySelectorAll('.cat-btn');
catBtns.forEach(function(b){
  b.addEventListener('click',function(){
    catBtns.forEach(function(x){x.classList.remove('active')});
    b.classList.add('active');
    renderForm(b.getAttribute('data-cat'));
  });
});
renderForm('competition');

var currentTarget=null,currentSelected='';
function openPicker(id,title,options,el){
  currentTarget=el;currentSelected='';
  document.getElementById('pickerTitle').textContent=title;
  var html='';options.forEach(function(o){html+='<div class="picker-option" onclick="selectOption(this)">'+o+'</div>'});
  document.getElementById('pickerOptions').innerHTML=html;
  document.getElementById('pickerMask').classList.add('show');
  document.getElementById('pickerPanel').classList.add('show');
}
function selectOption(el){
  document.querySelectorAll('.picker-option').forEach(function(x){x.classList.remove('selected')});
  el.classList.add('selected');currentSelected=el.textContent;
}
function confirmPicker(){
  if(currentSelected&&currentTarget){
    currentTarget.querySelector('span').textContent=currentSelected;
    currentTarget.querySelector('span').classList.remove('placeholder');
    currentTarget.querySelector('span').style.color='#1E2532';
  }
  closePicker();
}
function closePicker(){
  document.getElementById('pickerMask').classList.remove('show');
  document.getElementById('pickerPanel').classList.remove('show');
}

function openActionSheet(){
  document.getElementById('actionSheetMask').classList.add('show');
  document.getElementById('actionSheet').classList.add('show');
}
function closeActionSheet(){
  document.getElementById('actionSheetMask').classList.remove('show');
  document.getElementById('actionSheet').classList.remove('show');
}

function submitForm(){
  showToast('提交成功，等待学院审核','success');
  setTimeout(function(){location.href='student-requests.html'},1500);
}

function showToast(msg,type){
  var t=document.getElementById('toast');
  var icon=type==='success'?'<i class="fa-solid fa-circle-check" style="color:#1BB975"></i>':'<i class="fa-solid fa-circle-info" style="color:#64B5F6"></i>';
  t.innerHTML=icon+msg;t.classList.add('show');
  clearTimeout(t._timer);t._timer=setTimeout(function(){t.classList.remove('show')},1800);
}
</script>
