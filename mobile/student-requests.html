<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的申请</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'OPPOSans',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#F5F7FA;color:#3C444F;min-height:100vh;max-width:428px;margin:0 auto;font-size:14px;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

.top-bar{position:sticky;top:0;z-index:100;background:#fff;height:44px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #ECEFF4;font-size:16px;font-weight:600}

.page-body{padding:0 0 80px}

.status-tabs{display:flex;background:#fff;padding:0 8px;border-bottom:1px solid #ECEFF4;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.status-tabs::-webkit-scrollbar{display:none}
.s-tab{flex:1;min-width:0;padding:12px 8px;font-size:13px;text-align:center;color:#9096A2;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-weight:500}
.s-tab.active{color:#1BB975;border-bottom-color:#1BB975;font-weight:600}

.req-list{padding:12px 16px}

.req-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.03);cursor:pointer;transition:transform .15s;position:relative}
.req-card:active{transform:scale(0.98)}
.req-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.req-type{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:#3087CC;background:#E3F1F9;padding:3px 8px;border-radius:4px}
.req-type.errata{color:#F29100;background:#FFF5E5}
.req-status{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:600}
.req-status.passed{background:#E8FCF4;color:#1BB975}
.req-status.pending{background:#FFF5E5;color:#F29100}
.req-status.rejected{background:#FCE8EA;color:#DF2027}
.req-status.review{background:#E3F1F9;color:#3087CC}
.req-status.draft{background:#F2F3F5;color:#9096A2}
.req-title{font-size:14px;font-weight:600;margin-bottom:4px}
.req-desc{font-size:12px;color:#9096A2;margin-bottom:6px}
.req-date{font-size:11px;color:#C8CAD1}
.req-reason{margin-top:8px;padding:10px 12px;background:#FFF5F5;border-radius:8px;border-left:3px solid #DF2027;font-size:12px;color:#DF2027;line-height:1.5}

.fab{position:fixed;bottom:72px;right:50%;transform:translateX(calc(50% + 160px));width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1BB975,#0fae66);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(27,185,117,0.4);cursor:pointer;border:none;z-index:90;transition:transform .15s}
.fab:active{transform:translateX(calc(50% + 160px)) scale(0.9)}

.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:428px;height:56px;background:#fff;border-top:1px solid #ECEFF4;display:flex;align-items:center;z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:#9096A2;cursor:pointer;padding:6px 0;transition:color .15s;text-decoration:none}
.tab-item i{font-size:20px}
.tab-item.active{color:#1BB975}
.tab-item:active{opacity:0.7}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);background:rgba(0,0,0,0.75);color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;z-index:999;opacity:0;transition:all .3s;pointer-events:none;max-width:300px;text-align:center}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

.drawer-mask{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.drawer-mask.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:428px;max-height:75vh;background:#fff;border-radius:20px 20px 0 0;z-index:201;transition:transform .35s cubic-bezier(0.32,0.72,0,1);overflow-y:auto;-webkit-overflow-scrolling:touch}
.drawer.show{transform:translateX(-50%) translateY(0)}
.drawer-handle{width:36px;height:4px;background:#E0E0E0;border-radius:2px;margin:10px auto 0;cursor:pointer;padding:8px 0}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid #F2F3F5}
.drawer-title{font-size:16px;font-weight:700}
.drawer-close{width:28px;height:28px;border-radius:50%;background:#F5F7FA;display:flex;align-items:center;justify-content:center;font-size:14px;color:#9096A2;cursor:pointer;border:none;font-family:inherit}
.drawer-body{padding:20px}

.detail-section{margin-bottom:20px}
.detail-label{font-size:12px;color:#9096A2;margin-bottom:6px;font-weight:500}
.detail-value{font-size:14px;color:#3C444F;line-height:1.6}

.progress-bar{display:flex;align-items:center;gap:0;margin:8px 0}
.progress-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.progress-dot{width:24px;height:24px;border-radius:50%;background:#E8FCF4;color:#1BB975;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;z-index:1;border:2px solid #1BB975}
.progress-dot.inactive{background:#F2F3F5;color:#C8CAD1;border-color:#E0E0E0}
.progress-dot.current{background:#1BB975;color:#fff}
.progress-dot.rejected{background:#FCE8EA;color:#DF2027;border-color:#DF2027}
.progress-label{font-size:10px;color:#9096A2;margin-top:4px;white-space:nowrap}
.progress-line{flex:1;height:2px;background:#1BB975;margin:0 -2px;position:relative;top:-14px}
.progress-line.inactive{background:#E0E0E0}

.btn-action{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:10px}
.btn-action:active{opacity:0.8}
.btn-action.green{background:#1BB975}
.btn-action.red{background:#DF2027}
.btn-action.blue{background:#3087CC}
.btn-action.gray{background:#696F7D}
</style>
</head>
<body>
<div class="top-bar">我的申请</div>

<div class="page-body">
  <div class="status-tabs" id="statusTabs">
    <span class="s-tab active" data-filter="all">全部</span>
    <span class="s-tab" data-filter="pending">待审核</span>
    <span class="s-tab" data-filter="passed">已通过</span>
    <span class="s-tab" data-filter="rejected">已退回</span>
    <span class="s-tab" data-filter="draft">草稿</span>
  </div>

  <div class="req-list" id="reqList">
    <div class="req-card" data-status="passed" onclick="openDrawer(0)">
      <div class="req-top">
        <span class="req-type">补充</span>
        <span class="req-status passed">已通过</span>
      </div>
      <div class="req-title">竞赛获奖</div>
      <div class="req-desc">ACM-ICPC 亚洲区域赛 银奖</div>
      <div class="req-date">2026-05-10</div>
    </div>

    <div class="req-card" data-status="pending" onclick="openDrawer(1)">
      <div class="req-top">
        <span class="req-type errata">勘误</span>
        <span class="req-status pending">待学院审核</span>
      </div>
      <div class="req-title">发表论文</div>
      <div class="req-desc">SCI论文标题修正</div>
      <div class="req-date">2026-05-08</div>
    </div>

    <div class="req-card" data-status="rejected" onclick="openDrawer(2)">
      <div class="req-top">
        <span class="req-type">补充</span>
        <span class="req-status rejected">已退回</span>
      </div>
      <div class="req-title">创新创业</div>
      <div class="req-desc">互联网+大学生创新创业大赛</div>
      <div class="req-date">2026-05-05</div>
      <div class="req-reason">退回原因：证明材料不清晰，请重新上传</div>
    </div>

    <div class="req-card" data-status="pending" onclick="openDrawer(3)">
      <div class="req-top">
        <span class="req-type">补充</span>
        <span class="req-status review">待部门复审</span>
      </div>
      <div class="req-title">奖学金</div>
      <div class="req-desc">国家奖学金</div>
      <div class="req-date">2026-04-20</div>
    </div>

    <div class="req-card" data-status="draft" onclick="openDrawer(4)">
      <div class="req-top">
        <span class="req-type">补充</span>
        <span class="req-status draft">草稿</span>
      </div>
      <div class="req-title">科研实践</div>
      <div class="req-desc">大学生创新创业训练计划</div>
      <div class="req-date">草稿</div>
    </div>
  </div>
</div>

<a class="fab" href="student-supplement.html"><i class="fas fa-plus"></i></a>

<div class="drawer-mask" id="drawerMask" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle" onclick="closeDrawer()"></div>
  <div class="drawer-header">
    <div class="drawer-title" id="drawerTitle">申请详情</div>
    <button class="drawer-close" onclick="closeDrawer()"><i class="fas fa-xmark"></i></button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<div class="tab-bar">
  <a class="tab-item" href="student-home.html"><i class="fas fa-home"></i><span>首页</span></a>
  <a class="tab-item" href="student-archive.html"><i class="fas fa-archive"></i><span>档案</span></a>
  <a class="tab-item active" href="student-requests.html"><i class="fas fa-paper-plane"></i><span>申请</span></a>
  <a class="tab-item" href="student-confirm.html"><i class="fas fa-clipboard-check"></i><span>鉴定</span></a>
</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(function(){t.classList.remove('show')},2000)}

var drawerData=[
  {type:'补充',category:'竞赛获奖',title:'ACM-ICPC 亚洲区域赛 银奖',date:'2026-05-10',status:'已通过',statusClass:'passed',
   details:'竞赛名称：ACM-ICPC 亚洲区域赛\n获奖等级：银奖\n竞赛级别：国家级\n获奖时间：2025-11\n证明材料：已上传',
   progress:[{label:'提交',done:true},{label:'学院初审',done:true},{label:'部门复审',done:true},{label:'入库',done:true}]},
  {type:'勘误',category:'发表论文',title:'SCI论文标题修正',date:'2026-05-08',status:'待学院审核',statusClass:'pending',
   details:'论文标题：基于深度学习的图像分类研究\n修正内容：论文标题英文拼写修正\n发表期刊：IEEE Access\n证明材料：已上传',
   progress:[{label:'提交',done:true},{label:'学院初审',done:false,current:true},{label:'部门复审',done:false},{label:'入库',done:false}]},
  {type:'补充',category:'创新创业',title:'互联网+大学生创新创业大赛',date:'2026-05-05',status:'已退回',statusClass:'rejected',
   details:'项目名称：互联网+大学生创新创业大赛\n获奖等级：省赛金奖\n获奖时间：2025-10\n证明材料：已上传',
   progress:[{label:'提交',done:true},{label:'学院初审',done:false,rejected:true},{label:'部门复审',done:false},{label:'入库',done:false}],
   reason:'证明材料不清晰，请重新上传'},
  {type:'补充',category:'奖学金',title:'国家奖学金',date:'2026-04-20',status:'待部门复审',statusClass:'review',
   details:'奖学金名称：国家奖学金\n奖学金级别：国家级\n获奖学年：2025-2026\n奖金金额：8000元\n证明材料：已上传',
   progress:[{label:'提交',done:true},{label:'学院初审',done:true},{label:'部门复审',done:false,current:true},{label:'入库',done:false}]},
  {type:'补充',category:'科研实践',title:'大学生创新创业训练计划',date:'草稿',status:'草稿',statusClass:'draft',
   details:'项目名称：大学生创新创业训练计划\n项目级别：国家级\n立项时间：2025-06\n项目状态：进行中\n证明材料：待上传',
   progress:[{label:'提交',done:false},{label:'学院初审',done:false},{label:'部门复审',done:false},{label:'入库',done:false}]}
];

function openDrawer(idx){
  var d=drawerData[idx];
  document.getElementById('drawerTitle').textContent='['+d.type+'] '+d.category;
  var html='';
  html+='<div class="detail-section"><div class="detail-label">申请内容</div><div class="detail-value">'+d.title+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">提交时间</div><div class="detail-value">'+d.date+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">当前状态</div><div class="detail-value"><span class="req-status '+d.statusClass+'" style="font-size:13px;padding:4px 10px">'+d.status+'</span></div></div>';
  html+='<div class="detail-section"><div class="detail-label">数据明细</div><div class="detail-value" style="white-space:pre-line">'+d.details+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">审核进度</div>';
  html+='<div style="display:flex;align-items:flex-start;margin-top:8px">';
  for(var i=0;i<d.progress.length;i++){
    var p=d.progress[i];
    var dotClass='progress-dot';
    if(p.rejected) dotClass+=' rejected';
    else if(p.current) dotClass+=' current';
    else if(!p.done) dotClass+=' inactive';
    html+='<div class="progress-step"><div class="'+dotClass+'">';
    if(p.rejected) html+='<i class="fas fa-xmark"></i>';
    else if(p.done) html+='<i class="fas fa-check"></i>';
    else if(p.current) html+=(i+1);
    else html+=(i+1);
    html+='</div><div class="progress-label">'+p.label+'</div></div>';
    if(i<d.progress.length-1){
      var lineClass=(p.done&&d.progress[i+1].done)?'progress-line':'progress-line inactive';
      html+='<div class="'+lineClass+'"></div>';
    }
  }
  html+='</div></div>';

  if(d.reason){
    html+='<div class="detail-section"><div class="detail-label">退回原因</div><div class="req-reason" style="margin-top:4px">'+d.reason+'</div></div>';
    html+='<button class="btn-action red" onclick="location.href=\'student-supplement.html\'"><i class="fas fa-redo"></i> 修改重提</button>';
  }

  if(d.statusClass==='passed'){
    html+='<button class="btn-action green" onclick="location.href=\'student-archive.html\'"><i class="fas fa-database"></i> 查看入库数据</button>';
  }

  if(d.statusClass==='draft'){
    html+='<button class="btn-action blue" onclick="location.href=\'student-supplement.html\'"><i class="fas fa-pen-to-square"></i> 继续编辑</button>';
  }

  document.getElementById('drawerBody').innerHTML=html;
  document.getElementById('drawerMask').classList.add('show');
  document.getElementById('drawer').classList.add('show');
  document.body.style.overflow='hidden';
}

function closeDrawer(){
  document.getElementById('drawerMask').classList.remove('show');
  document.getElementById('drawer').classList.remove('show');
  document.body.style.overflow='';
}

var sTabs=document.querySelectorAll('.s-tab');
sTabs.forEach(function(tab){
  tab.addEventListener('click',function(){
    sTabs.forEach(function(t){t.classList.remove('active')});
    tab.classList.add('active');
    var filter=tab.getAttribute('data-filter');
    var cards=document.querySelectorAll('.req-card');
    cards.forEach(function(card){
      if(filter==='all'){card.style.display='';return}
      card.style.display=card.getAttribute('data-status')===filter?'':'none';
    });
  });
});
</script>
</body>
</html>
